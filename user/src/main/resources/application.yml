# MSA k8s-aws version


eureka:
  client:
    enabled: false

spring:
  application:
    name: user-service
  
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://${DB_HOST}:3306/inspire?useSSL=true&requireSSL=true  
    username: ${DB_ADMIN}
    password: ${DB_PASSWORD}

  data:
    redis:
      host: redis-service
      port: 6379
      password: 
      timeout: 6000ms


  jpa:
    database: mysql
    # create, create-drop, update, none
    database-platform: org.hibernate.dialect.MariaDBDialect    
    generate-ddl: true
    hibernate:
        ddl-auto: create
    # 콘솔출력
    show-sql: true  


jwt:
  secret: daniel-secret-key-for-jwt-123456789
