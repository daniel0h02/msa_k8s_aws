#버전
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-deployment
  namespace: lgcns
    

spec: 
  # 자원 공간의 낭비를 방지 및 관리의 편의성을 제공해주는 옵션
  revisionHistoryLimit: 2

  replicas: 1
  selector:
    matchLabels:      # 서비스가 찾는 이름
      app: product

  template:           # pod를 만드는 작업
    metadata:
      labels:
        app: product

    spec:
    #docker container
      containers:
      - name: product-container
        # ERC 경로
        image: 933090817123.dkr.ecr.us-east-2.amazonaws.com/product-service:latest
        ports:
          - containerPort: 8080
        resources:
          # 컨테이너가 사용할 수 있는 최대치의 리소스
          limits:
            cpu: "1"
            memory: "500Mi"
          
          # 컨테이너가 기동할 때 보장 받는 최소 리소스, limits 초과했을 때 새로운 생성 요청
          requests:
            cpu: "0.5"
            memory: "500Mi"
        # secret 작성 후 외부횐경변수를 이용해서 피드 실행 시 주입할 에정
        env: 
          - name: DB_HOST
            valueFrom:
              secretKeyRef:
                name: lgcns-app-secrets
                key: DB_HOST

          - name: DB_ADMIN
            valueFrom:
              secretKeyRef:
                name: lgcns-app-secrets
                key: DB_ADMIN

          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: lgcns-app-secrets
                key: DB_PASSWORD 
          
          # 컨테이너 상태 확인
        # readinessProbe:
        #   httpGet:
        #     path: /health
        #     port: 8080
          

  

---  #구분 지어야 함

#core service setting
apiVersion: v1

kind: Service

metadata:
  name: product-service
  namespace: lgcns

spec: 
  type: ClusterIP           # 내부 타입, 여러가지 있음
  ports:
  - port: 80
    targetPort: 8080        # container port를 의미*
  selector:
    app: product    #selector의 name, 이걸로 pod를 보는 것임