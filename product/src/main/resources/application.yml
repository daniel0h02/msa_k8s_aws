# # eureka client user service -> eureka server
# eureka:
#     client:
#         serviceUrl:
#             defaultZone: http://localhost:8761/eureka/


# MSA k8s-aws version
eureka:
  client:
    enabled: false


spring:

  application:
    name: product-service

  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://${DB_HOST}:3306/inspire?useSSL=true&requireSSL=true  
    username: ${DB_ADMIN}
    password: ${DB_PASSWORD}


  jpa:
    database: mysql
    # create, create-drop, update, none
    database-platform: org.hibernate.dialect.MariaDBDialect    
    generate-ddl: true
    hibernate:
        ddl-auto: create
    # 콘솔출력
    show-sql: true  

    # pod 실행중인 service 이름으로 변경(localhost X)
  kafka:
    kafka-server: kafka-service:9092
    consumer: 
        group-id: product-group
        auto-offset-reset: earliest

