eureka:
  client:
    enabled: false


spring:

  application:
    name: order-service

  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://${DB_HOST}:3306/inspire?useSSL=true&requireSSL=true  
    username: ${DB_ADMIN}
    password: ${DB_PASSWORD}


  jpa:
    database: mysql
    # create, create-drop, update, none
    database-platform: org.hibernate.dialect.MariaDBDialect    
    generate-ddl: true
    hibernate:
        ddl-auto: create
    # 콘솔출력
    show-sql: true  

    # pod 실행중인 service 이름으로 변경(localhost X)
  kafka:
    kafka-server: kafka-service:9092

# Feign + CircuitBreaker 활성화
feign:
  circuitbreaker:
    enabled: true


# Feign + CircuitBreaker 트렌젝션 정리
resilience4j:
  circuitbreaker:
    instances:
      productService:
        failure-rate-threshold: 40
        wait-duration-in-open-state: 10s


